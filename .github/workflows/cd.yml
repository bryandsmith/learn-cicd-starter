name: CD
on:
  push:
    branches: [main]
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: checkout the code
      uses: actions/checkout@v4
    - name: setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26.0"
    - name: build app
      run: ./scripts/buildprod.sh
    - id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
    - name: Use gcloud CLI
      run: gcloud info
    - name: push image to google artifact registry
      run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-494419/notely-ar-repo/bryandsmith/notely:latest .
    - name: Deploy to Cloud Run
      run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-494419/notely-ar-repo/bryandsmith/notely:latest --region us-central1 --allow-unauthenticated --project notely-494419 --max-instances=4
